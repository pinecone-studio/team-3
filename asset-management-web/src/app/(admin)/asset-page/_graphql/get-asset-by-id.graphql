query GetAssetById($getAssetByIdId: ID!) {
  getAssetById(id: $getAssetByIdId) {
    id
    assetTag
    category {
      id
      name
      description
      assets {
        id
        assetTag
        serialNumber
        status
        purchaseDate
        purchaseCost
        currentBookValue
        locationId
        assignedTo
        deletedAt
        imageUrl
        qrUrl
        name
      }
    }
    subCategory {
      id
      name
      categoryId
    }
    serialNumber
    status
    purchaseDate
    purchaseCost
    currentBookValue
    locationId
    assignedTo
    deletedAt
    department {
      id
      name
    }
    imageUrl
    qrUrl
    name
  }
}