query GetSubCategoriesWithCategory {
  getSubCategoriesWithCategory {
    categories {
      id
      name
      description
      assets {
        id
        assetTag
        category {
          id
          name
          description
        }
        serialNumber
        status
        purchaseDate
        purchaseCost
        currentBookValue
        locationId
        assignedTo
        deletedAt
      }
    }
    sub_categories {
      id
      name
      categoryId
    }
  }
}